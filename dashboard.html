<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValorAgro - Dashboard Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Days+One&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --v1:#B1CF4D; --v2:#6CB741; --v3:#008556;
    --vd:#00613e; --vbg:#004d30;
    --bg:#f4f9f6; --card:#ffffff;
    --texto:#0d2e1a; --suave:#4a6b57; --borde:#daeee2;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Geologica',sans-serif; background:var(--bg); color:var(--texto); min-height:100vh; }

  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(140deg,var(--vbg) 0%,var(--vd) 50%,var(--v3) 100%);
  }
  .login-card {
    background:white; border-radius:20px; padding:48px 40px;
    width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .login-logo { text-align:center; margin-bottom:28px; }
  .login-title { font-family:'Days One',sans-serif; font-size:1.5rem; color:var(--vbg); text-align:center; margin-bottom:6px; }
  .login-sub { color:var(--suave); font-size:0.85rem; text-align:center; margin-bottom:32px; }
  .login-field { margin-bottom:16px; }
  .login-field label { display:block; font-size:0.8rem; font-weight:600; color:var(--suave); margin-bottom:6px; letter-spacing:0.05em; text-transform:uppercase; }
  .login-field input {
    width:100%; padding:12px 16px; border:2px solid var(--borde); border-radius:10px;
    font-family:'Geologica',sans-serif; font-size:0.9rem; color:var(--texto); outline:none; transition:border-color 0.2s;
  }
  .login-field input:focus { border-color:var(--v3); }
  .login-btn {
    width:100%; padding:14px; border:none; border-radius:10px; cursor:pointer;
    background:linear-gradient(135deg,var(--v3),var(--v2));
    color:white; font-family:'Geologica',sans-serif; font-size:0.95rem; font-weight:600;
    margin-top:8px; transition:opacity 0.2s;
  }
  .login-btn:hover { opacity:0.88; }
  .login-error { color:#e53e3e; font-size:0.82rem; text-align:center; margin-top:12px; display:none; }

  #dashboard { display:none; }

  .topbar {
    background:linear-gradient(140deg,var(--vbg) 0%,var(--vd) 50%,var(--v3) 100%);
    padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .topbar-left { display:flex; align-items:center; gap:14px; }
  .topbar-logo { width:64px; height:auto; }
  .topbar-title { font-family:'Days One',sans-serif; color:white; font-size:1.1rem; }
  .topbar-sub { color:rgba(255,255,255,0.6); font-size:0.72rem; margin-top:1px; }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .last-update { color:rgba(255,255,255,0.55); font-size:0.75rem; }
  .logout-btn {
    background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
    color:white; padding:6px 14px; border-radius:8px; cursor:pointer;
    font-family:'Geologica',sans-serif; font-size:0.78rem; transition:background 0.2s;
  }
  .logout-btn:hover { background:rgba(255,255,255,0.25); }

  .dash-body { padding:28px 32px; max-width:1400px; margin:0 auto; }

  .scorecards { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .scorecard {
    background:var(--card); border-radius:14px; padding:22px 24px;
    border:1px solid var(--borde); box-shadow:0 2px 8px rgba(0,77,48,0.06);
    position:relative; overflow:hidden;
  }
  .scorecard::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--v3),var(--v2)); }
  .sc-label { font-size:0.72rem; font-weight:600; color:var(--suave); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
  .sc-value { font-family:'Days One',sans-serif; font-size:2.2rem; color:var(--texto); line-height:1; }
  .sc-sub { font-size:0.78rem; color:var(--suave); margin-top:6px; }
  .sc-icon { position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:2rem; opacity:0.15; }

  .charts-row { display:grid; gap:20px; margin-bottom:20px; }
  .charts-row.two  { grid-template-columns:2fr 1fr; }
  .charts-row.full { grid-template-columns:1fr; }
  .chart-card {
    background:var(--card); border-radius:14px; padding:24px;
    border:1px solid var(--borde); box-shadow:0 2px 8px rgba(0,77,48,0.06);
  }
  .chart-title { font-family:'Days One',sans-serif; font-size:0.95rem; color:var(--texto); margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .chart-title::before { content:''; width:6px; height:6px; background:var(--v1); border-radius:50%; flex-shrink:0; }
  .chart-sub { font-size:0.75rem; color:var(--suave); margin-bottom:20px; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.83rem; }
  th { background:var(--bg); color:var(--suave); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; padding:10px 14px; text-align:left; border-bottom:2px solid var(--borde); }
  td { padding:11px 14px; border-bottom:1px solid var(--borde); vertical-align:top; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#f8fdf9; }
  .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.7rem; font-weight:600; }
  .badge-cuenta        { background:#e8f5e3; color:#008556; }
  .badge-transferencias{ background:#e3f0fb; color:#1a6fb0; }
  .badge-saldo         { background:#fef9e3; color:#b08010; }
  .badge-pagos         { background:#f3e8fb; color:#7b2fa8; }
  .badge-servicios     { background:#fde8e8; color:#b02020; }
  .badge-seguridad     { background:#ffe8d0; color:#b05010; }
  .badge-problemas     { background:#e8e8fe; color:#3030b0; }
  .badge-soporte       { background:#e8fef8; color:#107060; }
  .badge-general       { background:#f0f0f0; color:#606060; }
  .badge-si  { background:#e8f5e3; color:#008556; }
  .badge-no  { background:#f0f0f0; color:#808080; }
  .pregunta-cell { max-width:280px; }
  .respuesta-cell { max-width:340px; color:var(--suave); font-size:0.8rem; }
  .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
  .loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--suave); font-size:0.9rem; gap:10px; }
  .spinner { width:20px; height:20px; border:3px solid var(--borde); border-top-color:var(--v3); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media(max-width:900px) {
    .scorecards { grid-template-columns:repeat(2,1fr); }
    .charts-row.two { grid-template-columns:1fr; }
    .dash-body { padding:16px; }
    .topbar { padding:12px 16px; }
  }
</style>
</head>

let authUser = "", authPwd = "";

function doLogin() {
  var user = document.getElementById('loginUser').value.trim();
  var pwd  = document.getElementById('loginPass').value.trim();
  if (!user || !pwd) return;
  authUser = user; authPwd = pwd;
  fetch(API + "/dashboard-data?user=" + encodeURIComponent(user) + "&pwd=" + encodeURIComponent(pwd))
    .then(function(r) { if (!r.ok) throw new Error('401'); return r.json(); })
    .then(function(data) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderDashboard(data);
    })
    .catch(function() {
      document.getElementById('loginError').style.display = 'block';
    });
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function badgeTema(tema) {
  return '<span class="badge badge-' + tema + '">' + tema + '</span>';
}

function renderDashboard(d) {
  document.getElementById('lastUpdate').textContent =
    'Actualizado: ' + new Date().toLocaleString('es-AR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});

  var verdes = ['#008556','#6CB741','#B1CF4D','#00a86b','#4da86b','#80c080','#c0d880','#d4e860'];

  var rows = d.ultimas.map(function(u) {
    return '<tr>' +
      '<td style="white-space:nowrap;font-size:0.78rem;color:var(--suave)">' + u.fecha.replace('T',' ').substring(0,16) + '</td>' +
      '<td class="pregunta-cell"><span class="truncate" title="' + u.pregunta + '">' + u.pregunta + '</span></td>' +
      '<td class="respuesta-cell"><span class="truncate" title="' + u.respuesta + '">' + u.respuesta + '</span></td>' +
      '<td>' + badgeTema(u.tema) + '</td>' +
      '<td><span class="badge ' + (u.derivado ? 'badge-si' : 'badge-no') + '">' + (u.derivado ? 'Si' : 'No') + '</span></td>' +
    '</tr>';
  }).join('');

  document.getElementById('dash-content').innerHTML =
    '<div class="scorecards">' +
      '<div class="scorecard"><div class="sc-label">Total consultas</div><div class="sc-value">' + d.total + '</div><div class="sc-sub">Conversaciones registradas</div><div class="sc-icon">💬</div></div>' +
      '<div class="scorecard"><div class="sc-label">Resueltas por IA</div><div class="sc-value">' + d.pct_resueltas + '<span style="font-size:1.2rem">%</span></div><div class="sc-sub">' + d.resueltas + ' consultas respondidas</div><div class="sc-icon">✅</div></div>' +
      '<div class="scorecard"><div class="sc-label">Derivadas a soporte</div><div class="sc-value">' + d.pct_derivadas + '<span style="font-size:1.2rem">%</span></div><div class="sc-sub">' + d.derivadas + ' derivadas</div><div class="sc-icon">📞</div></div>' +
      '<div class="scorecard"><div class="sc-label">Temas diferentes</div><div class="sc-value">' + d.por_tema.length + '</div><div class="sc-sub">Categorias consultadas</div><div class="sc-icon">🏷️</div></div>' +
    '</div>' +
    '<div class="charts-row two">' +
      '<div class="chart-card"><div class="chart-title">Consultas por dia</div><div class="chart-sub">Ultimos 30 dias</div><canvas id="chartDia" height="100"></canvas></div>' +
      '<div class="chart-card"><div class="chart-title">Temas mas consultados</div><div class="chart-sub">Distribucion por categoria</div><canvas id="chartTemas" height="180"></canvas></div>' +
    '</div>' +
    '<div class="charts-row two">' +
      '<div class="chart-card"><div class="chart-title">Horas pico</div><div class="chart-sub">Consultas por hora del dia</div><canvas id="chartHoras" height="120"></canvas></div>' +
      '<div class="chart-card"><div class="chart-title">Resueltas vs Derivadas</div><div class="chart-sub">Calidad de respuesta del bot</div><canvas id="chartCalidad" height="180"></canvas></div>' +
    '</div>' +
    '<div class="charts-row full">' +
      '<div class="chart-card"><div class="chart-title">Top 10 preguntas mas frecuentes</div><div class="chart-sub">Preguntas que mas repiten los usuarios</div><canvas id="chartTop" height="60"></canvas></div>' +
    '</div>' +
    '<div class="charts-row full">' +
      '<div class="chart-card"><div class="chart-title">Ultimas conversaciones</div><div class="chart-sub">Las 20 mas recientes</div>' +
        '<div class="table-wrap"><table><thead><tr><th>Fecha y hora</th><th>Pregunta</th><th>Respuesta</th><th>Tema</th><th>Derivada</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div>' +
      '</div>' +
    '</div>';

  new Chart(document.getElementById('chartDia'), {
    type:'line',
    data:{ labels: d.por_dia.map(function(x){return x.dia.substring(5);}),
      datasets:[{label:'Consultas', data:d.por_dia.map(function(x){return x.total;}),
        borderColor:'#008556', backgroundColor:'rgba(0,133,86,0.08)', borderWidth:2.5,
        pointBackgroundColor:'#008556', pointRadius:4, tension:0.4, fill:true}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });

  new Chart(document.getElementById('chartTemas'), {
    type:'doughnut',
    data:{ labels:d.por_tema.map(function(x){return x.tema;}),
      datasets:[{data:d.por_tema.map(function(x){return x.total;}), backgroundColor:verdes, borderWidth:2}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Geologica',size:11}}}}, cutout:'65%'}
  });

  var horas=[]; for(var i=0;i<24;i++) horas.push(i);
  var horaData=horas.map(function(h){var f=d.por_hora.find(function(x){return x.hora===h;});return f?f.total:0;});
  var maxH=Math.max.apply(null,horaData);
  new Chart(document.getElementById('chartHoras'), {
    type:'bar',
    data:{labels:horas.map(function(h){return h+'hs';}),
      datasets:[{label:'Consultas', data:horaData,
        backgroundColor:horaData.map(function(v){return v===maxH?'#008556':'rgba(0,133,86,0.25)';}), borderRadius:4}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });

  new Chart(document.getElementById('chartCalidad'), {
    type:'doughnut',
    data:{labels:['Resueltas por IA','Derivadas a soporte'],
      datasets:[{data:[d.resueltas,d.derivadas], backgroundColor:['#008556','#B1CF4D'], borderWidth:2}]},
    options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Geologica',size:11}}}}, cutout:'65%'}
  });

  new Chart(document.getElementById('chartTop'), {
    type:'bar',
    data:{labels:d.top_preguntas.map(function(x){return x.pregunta.length>45?x.pregunta.substring(0,45)+'...':x.pregunta;}),
      datasets:[{label:'Veces', data:d.top_preguntas.map(function(x){return x.total;}),
        backgroundColor:'rgba(0,133,86,0.7)', borderColor:'#008556', borderWidth:1, borderRadius:4}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}
</script>
</body>
</html>
